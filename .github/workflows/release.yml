name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, openssl
          tools: composer
          coverage: none

      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

      - name: Resolve version and release type
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}"  >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}"        >> "$GITHUB_OUTPUT"
            echo "prerelease=false"              >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "version=latest"               >> "$GITHUB_OUTPUT"
            echo "tag=latest"                   >> "$GITHUB_OUTPUT"
            echo "prerelease=true"              >> "$GITHUB_OUTPUT"
            echo "release_name=Latest build (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        run: |
          PLUGIN_SLUG="arunai-auto-news-poster"
          DIST_DIR="${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-${{ steps.meta.outputs.version }}.zip"

          mkdir -p "${DIST_DIR}"
          rsync -av --exclude="${DIST_DIR}" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".gitignore" \
            --exclude=".phpcs.xml" \
            --exclude=".DS_Store" \
            --exclude=".phpunit.result.cache" \
            --exclude="CLAUDE.md" \
            --exclude="CONTRIBUTING.md" \
            --exclude="README.md" \
            --exclude="docker-compose.yml" \
            --exclude="composer.json" \
            --exclude="composer.lock" \
            --exclude="phpunit.xml" \
            --exclude="vendor/" \
            --exclude="tests/" \
            --exclude="node_modules/" \
            --exclude="assets/screenshots/" \
            --exclude="*.zip" \
            . "${DIST_DIR}/"

          zip -r "${ZIP_NAME}" "${DIST_DIR}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: ${{ steps.meta.outputs.prerelease == 'false' }}
          files: ${{ env.ZIP_NAME }}
